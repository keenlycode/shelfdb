site_name: ShelfDB
site_description: Tiny document database for Python
docs_dir: docs-src
site_dir: docs

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Local API: local-api.md
  - Server Mode: server-mode.md
  - Query Model: query-model.md
  - Transactions: transactions.md
  - Security: security.md
  - API Reference: api-reference.md

theme:
  name: shadcn
  icon: null
  topbar_sections: false
  pygments_style:
    light: shadcn-light
    dark: github-dark

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            annotations_path: brief
            modernize_annotations: true
            separate_signature: true
            show_signature_annotations: true
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - codehilite
  - fenced_code
  - footnotes
  - pymdownx.blocks.details
  - pymdownx.tabbed
  - pymdownx.blocks.tab:
      combine_header_slug: true
      separator: ___
